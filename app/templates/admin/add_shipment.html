<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить груз — MajorLogistics Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Шапка админки (такая же как в dashboard) */
        .admin-header {
            background: #2c3e50;
            color: white;
            padding: 15px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .logo span {
            color: #3498db;
        }

        .admin-nav {
            display: flex;
            gap: 30px;
        }

        .admin-nav a {
            color: #ecf0f1;
            text-decoration: none;
            padding: 5px 0;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .admin-nav a:hover {
            color: white;
            border-bottom-color: #3498db;
        }

        .admin-nav a.active {
            border-bottom-color: #3498db;
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            padding: 8px 15px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        /* Основной контент */
        main {
            padding: 40px 0;
        }

        .page-title {
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .page-title h1 {
            font-size: 2rem;
            color: #2c3e50;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: #95a5a6;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .back-link:hover {
            background: #7f8c8d;
        }

        .back-link svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* Flash сообщения */
        .flash-messages {
            margin-bottom: 30px;
        }

        .flash-message {
            padding: 15px 20px;
            border-radius: 4px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .flash-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .flash-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .flash-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: inherit;
        }

        /* Карточка формы */
        .form-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 40px;
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-control:focus {
            outline: none;
            border-color: #3498db;
        }

        .form-control:hover {
            border-color: #bdc3c7;
        }

        select.form-control {
            cursor: pointer;
            background-color: white;
        }

        .form-actions {
            margin-top: 35px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .btn-primary {
            padding: 12px 30px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-primary:hover {
            background: #2ecc71;
        }

        .btn-secondary {
            padding: 12px 30px;
            background: #95a5a6;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        /* Адаптация */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .admin-nav {
                justify-content: center;
            }

            .user-info {
                width: 100%;
                justify-content: center;
            }

            .form-card {
                padding: 25px;
            }

            .form-actions {
                flex-direction: column;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <div class="container header-content">
            <div class="logo">
                Major<span>Logistics</span> Admin
            </div>
            <nav class="admin-nav">
                <a href="{{ url_for('admin.dashboard') }}">Дашборд</a>
                <a href="{{ url_for('admin.add_shipment') }}" class="active">Добавить груз</a>
            </nav>
            <div class="user-info">
                <span>Администратор</span>
                <a href="{{ url_for('admin.logout') }}" class="logout-btn">Выйти</a>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="page-title">
                <h1>➕ Добавить новый груз</h1>
                <a href="{{ url_for('admin.dashboard') }}" class="back-link">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                    Вернуться к списку
                </a>
            </div>

            <!-- Flash сообщения -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    <div class="flash-messages">
                        {% for category, message in messages %}
                            <div class="flash-message flash-{{ category }}">
                                {{ message }}
                                <button class="close-btn" onclick="this.parentElement.remove()">×</button>
                            </div>
                        {% endfor %}
                    </div>
                {% endif %}
            {% endwith %}

            <div class="form-card">
                <form method="post">
                    <div class="form-group">
                        <label for="tracking_number">Трек-номер *</label>
                        <input type="text" id="tracking_number" name="tracking_number" class="form-control" placeholder="Например: TRK-2024-001" required>
                    </div>

                    <div class="form-group">
                        <label for="origin">Откуда *</label>
                        <input type="text" id="origin" name="origin" class="form-control" placeholder="Город отправления" required>
                    </div>

                    <div class="form-group">
                        <label for="destination">Куда *</label>
                        <input type="text" id="destination" name="destination" class="form-control" placeholder="Город назначения" required>
                    </div>

                    <div class="form-group">
                        <label for="status">Статус</label>
                        <select id="status" name="status" class="form-control">
                            <option value="pending">⏳ В ожидании</option>
                            <option value="in_transit">🚚 В пути</option>
                            <option value="delivered">✅ Доставлено</option>
                            <option value="cancelled">❌ Отменено</option>
                        </select>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-primary">💾 Сохранить груз</button>
                        <a href="{{ url_for('admin.dashboard') }}" class="btn-secondary">↩ Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
